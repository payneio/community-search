<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Community Search</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="/static/style.css" />
<link rel="search" type="application/opensearchdescription+xml" title="Community Search" href="/opensearch.xml" />
</head>
<body>
<main>
  <h1>Community Search</h1>
  <form id="search-form">
    <input id="q" type="search" name="q" placeholder="Search" autofocus required />
    <select id="collection">
      <option value="">All collections</option>
    </select>
    <button type="submit">Search</button>
  </form>
  <div id="collection-meta" class="collection-meta" aria-live="polite"></div>
  <div id="status" aria-live="polite"></div>
  <ol id="results"></ol>
</main>
<script src="/static/app.js"></script>
</body>
</html>
